<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestor de Torneos Deportivos - Interfaz de Prueba</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 20px;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
      }

      header {
        background: white;
        padding: 30px;
        border-radius: 10px;
        margin-bottom: 30px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      }

      h1 {
        color: #333;
        margin-bottom: 10px;
      }

      .subtitle {
        color: #666;
        font-size: 14px;
      }

      .tabs {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
        border-bottom: 2px solid #ddd;
      }

      .tab-button {
        padding: 12px 20px;
        background: #f5f5f5;
        border: none;
        cursor: pointer;
        font-size: 14px;
        font-weight: 600;
        color: #666;
        border-radius: 5px 5px 0 0;
        transition: all 0.3s;
      }

      .tab-button.active {
        background: #667eea;
        color: white;
      }

      .tab-button:hover {
        background: #667eea;
        color: white;
      }

      .tab-content {
        display: none;
        background: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      }

      .tab-content.active {
        display: block;
      }

      .section {
        margin-bottom: 30px;
      }

      .section h2 {
        color: #333;
        margin-bottom: 20px;
        padding-bottom: 10px;
        border-bottom: 2px solid #667eea;
      }

      .form-group {
        margin-bottom: 15px;
      }

      label {
        display: block;
        margin-bottom: 5px;
        color: #333;
        font-weight: 600;
      }

      input[type="text"],
      input[type="date"],
      input[type="time"],
      input[type="number"],
      select {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 5px;
        font-size: 14px;
      }

      input[type="text"]:focus,
      input[type="date"]:focus,
      input[type="time"]:focus,
      input[type="number"]:focus,
      select:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
      }

      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
      }

      button {
        padding: 10px 20px;
        background: #667eea;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.3s;
      }

      button:hover {
        background: #5568d3;
        transform: translateY(-2px);
        box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
      }

      button.secondary {
        background: #6c757d;
      }

      button.secondary:hover {
        background: #5a6268;
      }

      .results {
        margin-top: 20px;
      }

      .result-item {
        background: #f8f9fa;
        padding: 15px;
        border-left: 4px solid #667eea;
        margin-bottom: 10px;
        border-radius: 5px;
      }

      .result-item h3 {
        color: #333;
        margin-bottom: 10px;
      }

      .result-item p {
        color: #666;
        font-size: 14px;
        margin: 5px 0;
      }

      .error {
        background: #f8d7da;
        color: #721c24;
        padding: 15px;
        border-radius: 5px;
        margin-bottom: 15px;
        border-left: 4px solid #f5c6cb;
      }

      .success {
        background: #d4edda;
        color: #155724;
        padding: 15px;
        border-radius: 5px;
        margin-bottom: 15px;
        border-left: 4px solid #c3e6cb;
      }

      .button-group {
        display: flex;
        gap: 10px;
        margin-top: 15px;
      }

      .button-group button {
        flex: 1;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
      }

      table th {
        background: #667eea;
        color: white;
        padding: 12px;
        text-align: left;
        font-weight: 600;
      }

      table td {
        padding: 12px;
        border-bottom: 1px solid #ddd;
      }

      table tr:hover {
        background: #f8f9fa;
      }

      .delete-btn {
        background: #dc3545;
        padding: 5px 10px;
        font-size: 12px;
      }

      .delete-btn:hover {
        background: #c82333;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>🏆 Gestor de Torneos Deportivos</h1>
        <p class="subtitle">
          Interfaz de Prueba - Gestiona eventos, participantes e inscripciones
        </p>
      </header>

      <div class="tabs">
        <button class="tab-button active" onclick="switchTab('eventos')">
          Eventos
        </button>
        <button class="tab-button" onclick="switchTab('participantes')">
          Participantes
        </button>
        <button class="tab-button" onclick="switchTab('inscripciones')">
          Inscripciones
        </button>
      </div>

      <!-- PESTAÑA DE EVENTOS -->
      <div id="eventos" class="tab-content active">
        <div class="section">
          <h2>Crear Evento</h2>
          <form onsubmit="crearEvento(event)">
            <div class="form-group">
              <label>Nombre del Evento:</label>
              <input type="text" id="eventoNombre" required />
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Fecha:</label>
                <input type="date" id="eventoFecha" required />
              </div>
              <div class="form-group">
                <label>Hora:</label>
                <input type="time" id="eventoHora" required />
              </div>
            </div>
            <div class="form-group">
              <label>Ubicación:</label>
              <input type="text" id="eventoUbicacion" required />
            </div>
            <div class="form-group">
              <label>Descripción:</label>
              <input
                type="text"
                id="eventoDescripcion"
                placeholder="Opcional"
              />
            </div>
            <button type="submit">Crear Evento</button>
          </form>
          <div id="eventoMessage"></div>
        </div>

        <div class="section">
          <h2>Listar Eventos</h2>
          <button onclick="listarEventos()">Obtener Todos los Eventos</button>
          <div id="eventosList" class="results"></div>
        </div>

        <div class="section">
          <h2>Buscar Evento por Fecha</h2>
          <div class="form-group">
            <label>Fecha:</label>
            <input type="date" id="searchFecha" />
          </div>
          <button onclick="buscarEventosPorFecha()">Buscar</button>
          <div id="eventosSearchList" class="results"></div>
        </div>
      </div>

      <!-- PESTAÑA DE PARTICIPANTES -->
      <div id="participantes" class="tab-content">
        <div class="section">
          <h2>Crear Participante</h2>
          <form onsubmit="crearParticipante(event)">
            <div class="form-group">
              <label>Nombre:</label>
              <input type="text" id="participanteNombre" required />
            </div>
            <div class="form-group">
              <label>Email:</label>
              <input type="text" id="participanteEmail" required />
            </div>
            <div class="form-group">
              <label>Teléfono:</label>
              <input type="text" id="participanteTelefono" required />
            </div>
            <button type="submit">Crear Participante</button>
          </form>
          <div id="participanteMessage"></div>
        </div>

        <div class="section">
          <h2>Listar Participantes</h2>
          <button onclick="listarParticipantes()">
            Obtener Todos los Participantes
          </button>
          <div id="participantesList" class="results"></div>
        </div>
      </div>

      <!-- PESTAÑA DE INSCRIPCIONES -->
      <div id="inscripciones" class="tab-content">
        <div class="section">
          <h2>Crear Inscripción</h2>
          <form onsubmit="crearInscripcion(event)">
            <div class="form-group">
              <label>ID del Participante:</label>
              <input type="number" id="inscripcionParticipanteId" required />
            </div>
            <div class="form-group">
              <label>ID del Evento:</label>
              <input type="number" id="inscripcionEventoId" required />
            </div>
            <div class="form-group">
              <label>Equipo (opcional):</label>
              <input type="text" id="inscripcionEquipo" />
            </div>
            <button type="submit">Crear Inscripción</button>
          </form>
          <div id="inscripcionMessage"></div>
        </div>

        <div class="section">
          <h2>Listar Inscripciones</h2>
          <button onclick="listarInscripciones()">
            Obtener Todas las Inscripciones
          </button>
          <div id="inscripcionesList" class="results"></div>
        </div>
      </div>
    </div>

    <script>
      const API_URL = "http://localhost:8090";

      function switchTab(tabName) {
        // Ocultar todas las pestañas
        document.querySelectorAll(".tab-content").forEach((tab) => {
          tab.classList.remove("active");
        });

        // Desactivar todos los botones
        document.querySelectorAll(".tab-button").forEach((btn) => {
          btn.classList.remove("active");
        });

        // Mostrar la pestaña seleccionada
        document.getElementById(tabName).classList.add("active");

        // Activar el botón correspondiente
        event.target.classList.add("active");
      }

      // FUNCIONES PARA EVENTOS
      async function crearEvento(e) {
        e.preventDefault();
        const evento = {
          nombre: document.getElementById("eventoNombre").value,
          fecha: document.getElementById("eventoFecha").value,
          hora: document.getElementById("eventoHora").value,
          ubicacion: document.getElementById("eventoUbicacion").value,
          descripcion: document.getElementById("eventoDescripcion").value,
        };

        try {
          const response = await fetch(`${API_URL}/eventos`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(evento),
          });

          if (response.ok) {
            showMessage(
              "eventoMessage",
              "Evento creado exitosamente",
              "success",
            );
            document.querySelector("form").reset();
          } else {
            showMessage("eventoMessage", "Error al crear el evento", "error");
          }
        } catch (error) {
          showMessage(
            "eventoMessage",
            "Error de conexión: " + error.message,
            "error",
          );
        }
      }

      async function listarEventos() {
        try {
          const response = await fetch(`${API_URL}/eventos`);
          const eventos = await response.json();

          let html = "";
          eventos.forEach((evento) => {
            html += `
                        <div class="result-item">
                            <h3>${evento.nombre}</h3>
                            <p><strong>ID:</strong> ${evento.id}</p>
                            <p><strong>Fecha:</strong> ${evento.fecha}</p>
                            <p><strong>Hora:</strong> ${evento.hora}</p>
                            <p><strong>Ubicación:</strong> ${evento.ubicacion}</p>
                            <p><strong>Descripción:</strong> ${evento.descripcion || "N/A"}</p>
                            <button class="delete-btn" onclick="eliminarEvento(${evento.id})">Eliminar</button>
                        </div>
                    `;
          });

          document.getElementById("eventosList").innerHTML =
            html || "<p>No hay eventos registrados</p>";
        } catch (error) {
          document.getElementById("eventosList").innerHTML =
            `<div class="error">Error: ${error.message}</div>`;
        }
      }

      async function buscarEventosPorFecha() {
        const fecha = document.getElementById("searchFecha").value;
        if (!fecha) {
          alert("Selecciona una fecha");
          return;
        }

        try {
          const response = await fetch(`${API_URL}/eventos/fecha/${fecha}`);
          const eventos = await response.json();

          let html = "";
          eventos.forEach((evento) => {
            html += `
                        <div class="result-item">
                            <h3>${evento.nombre}</h3>
                            <p><strong>ID:</strong> ${evento.id}</p>
                            <p><strong>Fecha:</strong> ${evento.fecha}</p>
                            <p><strong>Hora:</strong> ${evento.hora}</p>
                            <p><strong>Ubicación:</strong> ${evento.ubicacion}</p>
                        </div>
                    `;
          });

          document.getElementById("eventosSearchList").innerHTML =
            html || "<p>No hay eventos en esa fecha</p>";
        } catch (error) {
          document.getElementById("eventosSearchList").innerHTML =
            `<div class="error">Error: ${error.message}</div>`;
        }
      }

      async function eliminarEvento(id) {
        if (confirm("¿Estás seguro de que deseas eliminar este evento?")) {
          try {
            const response = await fetch(`${API_URL}/eventos/${id}`, {
              method: "DELETE",
            });

            if (response.ok) {
              listarEventos();
            } else {
              alert("Error al eliminar el evento");
            }
          } catch (error) {
            alert("Error: " + error.message);
          }
        }
      }

      // FUNCIONES PARA PARTICIPANTES
      async function crearParticipante(e) {
        e.preventDefault();
        const participante = {
          nombre: document.getElementById("participanteNombre").value,
          email: document.getElementById("participanteEmail").value,
          telefono: document.getElementById("participanteTelefono").value,
        };

        try {
          const response = await fetch(`${API_URL}/participantes`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(participante),
          });

          if (response.ok) {
            showMessage(
              "participanteMessage",
              "Participante creado exitosamente",
              "success",
            );
            document.querySelector("#participantes form").reset();
          } else {
            showMessage(
              "participanteMessage",
              "Error al crear el participante",
              "error",
            );
          }
        } catch (error) {
          showMessage(
            "participanteMessage",
            "Error de conexión: " + error.message,
            "error",
          );
        }
      }

      async function listarParticipantes() {
        try {
          const response = await fetch(`${API_URL}/participantes`);
          const participantes = await response.json();

          let html = "";
          participantes.forEach((participante) => {
            html += `
                        <div class="result-item">
                            <h3>${participante.nombre}</h3>
                            <p><strong>ID:</strong> ${participante.id}</p>
                            <p><strong>Email:</strong> ${participante.email}</p>
                            <p><strong>Teléfono:</strong> ${participante.telefono}</p>
                            <button class="delete-btn" onclick="eliminarParticipante(${participante.id})">Eliminar</button>
                        </div>
                    `;
          });

          document.getElementById("participantesList").innerHTML =
            html || "<p>No hay participantes registrados</p>";
        } catch (error) {
          document.getElementById("participantesList").innerHTML =
            `<div class="error">Error: ${error.message}</div>`;
        }
      }

      async function eliminarParticipante(id) {
        if (
          confirm("¿Estás seguro de que deseas eliminar este participante?")
        ) {
          try {
            const response = await fetch(`${API_URL}/participantes/${id}`, {
              method: "DELETE",
            });

            if (response.ok) {
              listarParticipantes();
            } else {
              alert("Error al eliminar el participante");
            }
          } catch (error) {
            alert("Error: " + error.message);
          }
        }
      }

      // FUNCIONES PARA INSCRIPCIONES
      async function crearInscripcion(e) {
        e.preventDefault();
        const inscripcion = {
          participanteId: document.getElementById("inscripcionParticipanteId")
            .value,
          eventoId: document.getElementById("inscripcionEventoId").value,
          equipo: document.getElementById("inscripcionEquipo").value,
        };

        try {
          const response = await fetch(`${API_URL}/inscripciones`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(inscripcion),
          });

          if (response.ok) {
            showMessage(
              "inscripcionMessage",
              "Inscripción creada exitosamente",
              "success",
            );
            document.querySelector("#inscripciones form").reset();
          } else {
            showMessage(
              "inscripcionMessage",
              "Error al crear la inscripción",
              "error",
            );
          }
        } catch (error) {
          showMessage(
            "inscripcionMessage",
            "Error de conexión: " + error.message,
            "error",
          );
        }
      }

      async function listarInscripciones() {
        try {
          const response = await fetch(`${API_URL}/inscripciones`);
          const inscripciones = await response.json();

          let html = "";
          inscripciones.forEach((inscripcion) => {
            html += `
                        <div class="result-item">
                            <h3>Inscripción #${inscripcion.id}</h3>
                            <p><strong>ID Participante:</strong> ${inscripcion.participanteId}</p>
                            <p><strong>ID Evento:</strong> ${inscripcion.eventoId}</p>
                            <p><strong>Equipo:</strong> ${inscripcion.equipo || "N/A"}</p>
                            <p><strong>Fecha de Inscripción:</strong> ${inscripcion.fechaInscripcion || "N/A"}</p>
                            <button class="delete-btn" onclick="eliminarInscripcion(${inscripcion.id})">Eliminar</button>
                        </div>
                    `;
          });

          document.getElementById("inscripcionesList").innerHTML =
            html || "<p>No hay inscripciones registradas</p>";
        } catch (error) {
          document.getElementById("inscripcionesList").innerHTML =
            `<div class="error">Error: ${error.message}</div>`;
        }
      }

      async function eliminarInscripcion(id) {
        if (confirm("¿Estás seguro de que deseas eliminar esta inscripción?")) {
          try {
            const response = await fetch(`${API_URL}/inscripciones/${id}`, {
              method: "DELETE",
            });

            if (response.ok) {
              listarInscripciones();
            } else {
              alert("Error al eliminar la inscripción");
            }
          } catch (error) {
            alert("Error: " + error.message);
          }
        }
      }

      function showMessage(elementId, message, type) {
        const element = document.getElementById(elementId);
        element.innerHTML = `<div class="${type}">${message}</div>`;
        setTimeout(() => {
          element.innerHTML = "";
        }, 5000);
      }
    </script>
  </body>
</html>
